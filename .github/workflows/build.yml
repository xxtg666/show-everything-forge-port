name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build
        run: ./gradlew clean build --no-daemon
      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: showeverything-neoforge-build
          path: build/libs/*.jar
          if-no-files-found: error
