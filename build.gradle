buildscript {
    repositories {
        mavenCentral()
        maven {
            name = "forge"
            url = "https://maven.minecraftforge.net"
        }
        maven {
            name = "sonatype"
            url = "https://oss.sonatype.org/content/repositories/snapshots/"
        }
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:1.2-SNAPSHOT'
    }
}

apply plugin: 'forge'

version = "1.0.2"
group = "dev.minerslab.showeverything"
archivesBaseName = "showeverything-forge-${project.mc_version}"

sourceCompatibility = targetCompatibility = '1.7'

minecraft {
    version = project.forge_version
    runDir = "run"
}

// ForgeGradle 1.2 predates Mojang's current launcher endpoints and otherwise
// tries to fetch the removed HTTP/S3 URLs. These are the official 1.7.10
// client/server objects from the version manifest.
downloadClient {
    url = new net.minecraftforge.gradle.delayed.DelayedString(project, "https://launcher.mojang.com/v1/objects/e80d9b3bf5085002218d4be59e668bac718abbc6/client.jar")
}
downloadServer {
    url = new net.minecraftforge.gradle.delayed.DelayedString(project, "https://launcher.mojang.com/v1/objects/952438ac4e01b4d115c5fc38f891710c4941df29/server.jar")
}
getVersionJson {
    url = "https://piston-meta.mojang.com/v1/packages/ed5d8789ed29872ea2ef1c348302b0c55e3f3468/1.7.10.json"
}

processResources {
    inputs.property "version", project.version
    inputs.property "mcversion", project.mc_version

    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand 'version': project.version, 'mcversion': project.mc_version
    }

    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
}
